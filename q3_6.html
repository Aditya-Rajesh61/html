<!DOCTYPE html>
<html>
<head>
<title>Student Information System</title>

<script>

var students = [];

function Student(name, age, course){
this.name = name;
this.age = age;
this.course = course;
}

function addStudent(btn){

var form = btn.form;

var name = form.elements["sname"].value;
var age = form.elements["sage"].value;
var course = form.elements["scourse"].value;

var stu = new Student(name, age, course);

students.push(stu);

generateTable();

form.reset();
form.elements["sname"].focus();

}

function generateTable(){

var html = "<table border='1'>";

html += "<tr><th>Name</th><th>Age</th><th>Course</th></tr>";

for(var i=0;i<students.length;i++){

html += "<tr>";
html += "<td>" + students[i].name + "</td>";
html += "<td>" + students[i].age + "</td>";
html += "<td>" + students[i].course + "</td>";
html += "</tr>";

}

html += "</table>";

document.getElementById("result").innerHTML = html;

}

</script>

</head>

<body>

<h2>Student Information System</h2>

<form>

Name:
<input type="text" name="sname"><br><br>

Age:
<input type="number" name="sage"><br><br>

Course:
<select name="scourse">
<option>BCA</option>
<option>BTech</option>
<option>MCA</option>
<option>MBA</option>
</select>

<br><br>

<input type="button" value="Add Student" onclick="addStudent(this)">
<input type="reset">

</form>

<div id="result"></div>

<br>
<p align="right">24BCE0942 Aditya Rajesh</p>

</body>
</html>
